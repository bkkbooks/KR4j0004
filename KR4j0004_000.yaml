body:
  text: 安陸集詞曲類一詞集之屬提要臣等謹案安陸集一卷宋張先撰考仁宗時有兩張先皆字子野其一博州人樞密副使張遜之孫天聖三年進士官至知亳州卒于寶元二年歐陽修為作墓志銘者是也其一烏程人天聖八年進士官至都官郎中即作此集者是也道山清話誤以博州張先為此張先誤之甚矣張鐸湖州府志稱先有文集一百卷惟樂府行子世宋史藝文志載先詩集二十卷陳振孫十詠圖跋稱偶藏子野詩一帙名安陸集舊京本也鄉守楊嗣翁見之因取刻之郡齋云云案此跋載周密齊東野語則振孫時其集尚存然振孫作直齋書録解題乃惟載張子野詞一卷而無其詩集殊不解其何故也自明以來併其詞集亦不傳故毛晉刻六十家詞獨不及先此本乃近時安邑葛鳴陽所輯凡詩八首詞六十八首併以先事迹始末及諸家贈答附録于後其編次雖以詩列詞前而為數無幾今從其多者為主録之于詞曲類中考蘇軾集有題張子野詩集後曰子野詩筆老妙歌詞乃其餘技耳華州西溪詩云浮萍破處見山影野艇歸時聞草聲案石林詩話瀛奎律髓草聲並誤作棹聲近時安邑葛氏刋本據漁隱叢話改正今從之與余和詩云愁似鰥魚知夜永懶同蝴蝶為春忙若此之類皆可以追配古人而世俗但稱其歌詞昔周昉畫人物皆入神品而世俗但知有周昉仕女皆所謂未見好德如好色者歟云云然軾所舉二聨皆涉纎巧自此二聨外今所傳者惟吳江一首稍可觀然欲圖江色不上筆靜覔鳥聲深在蘆一聨亦有纎巧之病平心而論要為詞勝于詩當時以張三影得名殆非無故軾所題跋當由好為髙論未可據為定評也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
