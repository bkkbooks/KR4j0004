body:
  text: 安陸集宋張先撰詞清平樂屏山斜展帳卷紅綃半泥淺曲池飛海燕風度楊花滿院雲愁雨恨空深覺來一枕春隂隴上梅花落盡江南消息沈沈卜算子慢溪山別意烟樹去程日落采蘋春晚欲上征鞅吳興藝文補作鞍更掩翠簾回面相盼惜彎彎淺黛長長眼奈畫閣歡遊也學狂花亂絮萬紅友詞律作狂風飛絮輕散水影橫池館對靜夜無人月髙雲逺一餉凝思兩眼淚痕還滿難遣恨私書又逐東風斷縱夢澤層樓萬尺望湖城那見木蘭花西湖楊柳風流絶滿縷青春看贈別牆頭簌簌暗飛花山外隂隂初落月秦姬穠麗雲梳髮持酒聽歌留晚發驪駒應亦解人情欲出重城嘶不歇又邠州作青銅貼水萍無數臨曉西湖春漲雨泥新輕燕面前飛風慢落花衣上住紅裙空解烟蛾聚雲月却能隨馬去明朝何處上髙臺回認玉峰山下路又去春自湖歸杭憶南園花巳開冇當時猶有蘂如梅之句今嵗還鄉南園正盛復為此詞以寄意去年春入芳菲國青蘂如梅終忍摘欄邊徒欲說相思緑蠟密緘朱粉飾歸來故苑重尋覓花滿舊枝心更惜鴛鴦從小自相雙若不多情頭不白又乙卯吳興寒食龍頭舴艋吳兒競筍柱鞦韆遊女並芳洲拾翠暮忘歸秀野踏青來不定行雲去後遙山暝已放笙歌池院靜中庭月色正清明無數楊花過無影憶秦娥參差竹吹斷相思曲情不足西北有詞律作髙樓窮逺目憶苕溪寒影透清玉秋雁南飛速菰草緑應下溪頭沙上宿慶春澤飛閣危橋相倚人獨立東風滿衣輕絮還記憶江南如今天氣正白蘋花繞隄漲流水寒梅落盡誰寄方春意無窮青空千里愁草樹依依關城初閉對月黃昏角聲傍烟起山亭宴有美堂贈彥猷主人宴堂永晝喧簫鼓倚青空畫欄紅柱玉瑩紫微人藹和氣春融日煦故宫池館更樓臺約風月今宵何處湖水動鮮衣競拾翠湖邊路落花蕩漾怨空樹曉山靜數聲杜宇天意送芳菲正黯淡疏烟短雨新歡寧似舊歡長此㑹散幾時還聚試為挹飛雲問解相思否剪牡丹舟中聞雙琵琶野緑連空天青垂水素色溶漾都淨柔柳搖搖墜輕絮無影汀洲日落人歸修巾薄袂擷香拾翠相競如解凌波泊渚烟春暝綵縚朱索新整宿繡屏畫船風定金鳯響雙槽彈出今古幽思誰省玉盤大小亂珠迸酒上糚面花豓媚相竝重聽盡漢妃一曲江空月靜案詞律曰此調多訛字如古今詩話所載子野警句柳徑無人墮飛絮無影正是此篇今本作柔柳搖搖墜輕絮無影定係訛錯推此則通篇訛錯無疑好事近和毅夫內翰梅花月色透橫枝短葉小葩無力北客一聲長笛怨江南先得誰教强半臘前開多情為春憶留取大家須醉幸雨休風息畫堂春外湖蓮子長參差霽山青處鷗飛水天溶漾畫橈遲人影檻中移桃葉淺聲雙唱杏紅深色輕衣小荷障面避斜暉分得翠隂歸踏莎行衾鳯猶溫籠鸚尚睡宿糚稀淡眉成字映花避月上回廊珠裙摺摺輕垂地翠幕成波新荷貼水紛紛烟絮低還起重墻繞院更重門春風無路通深意于飛樂寶奩開菱鑑淨一掬清蟾新糚臉旋學花添蜀紅衫雙繡蝶裙縷鶼鶼尋思前事小屏風仍畫江南怎空教草解宜男柔桑暗又過春蠶正隂晴天氣更暝色相兼幽期消息曲房西碎月篩簾惜瓊花汀蘋白苕水碧每逢花駐樂隨處歡席别時擕手看春色螢火而今飛破秋夕河流如帶窄任輕囗案詞律曰此調只後起五字不同餘平仄無一字不合後段任輕下各家詞選俱落一字夫上曰河流如帶矣則似葉者非舟而何豈一輕字可代舟乎况此正對每逢花駐樂五字無疑故用以補之似葉何計歸得斷雲孤䳱青山極樓上徘徊無盡相憶河滿子陪杭守泛湖夜歸溪女送花隨處沙鷗避樂分行遊舸巳如圗障裏小屏猶畫瀟湘人面新生酒艷日痕更欲春長衣上交枝鬬色叉頭比翼相雙片段落霞明水底風紋時動糚光賓從夜歸無月千燈萬火湖塘醉垂鞭錢塘送祖擇之酒面􅗷金魚吳娃唱吳潮上玉殿白麻書待君歸後除勾留風月好平湖曉翠峯孤此景出關無西州空畫圗又雙蝶繡羅裙東池宴初相見朱粉不深勻閒花淡淡春細看諸處好人人道柳腰身昨日亂山昏來時衣上雲謝池春慢玉仙觀道中逢謝媚卿繚牆重院間有流鶯到繡被掩餘寒畫閣明新曉朱檻連空一作雲濶飛絮無草堂詩餘作舞多少徑莎平池水渺日長風靜花影閒相照塵香拂馬逢謝女城南道秀豓過施粉多媚生輕笑鬬色鮮衣薄碾玉雙蟬小歡難偶春過了琵琶流怨都入相思調減字木蘭花贈伎垂螺近額走上紅裀初趂拍只恐驚飛擬倩游絲惹住伊文鴛繡履去似風流塵不起舞徹梁州頭上宫花顫未休案徐電發詞苑叢談曰子野詞垂螺近額晏小山詞雙螺未學同心綰垂螺雙螺蓋宋時角妓未破瓜時髮飾之名今秦中妓及搬演旦色猶有此製醉落魄美人吹笛雲輕柳弱內家髻子新梳掠生香真色人難學橫管孤吹月淡天垂幕朱脣淺破櫻桃蕚倚樓人在闌干角夜寒指冷羅衣薄聲入霜林簌簌驚梅落師師令贈美人案詞苑叢談曰子野贈李師師作也香鈿寶珥拂菱花如水學糚皆道稱時宜粉色有天然春意蜀綵衣長一作裳勝未起縱亂霞垂地都城池苑誇桃李問東風何似不須回扇障清歌脣一㸃小于朱詞苑叢談作花蘂正值殘英和月墜寄此情千里繫裙腰濃草堂詩餘及詞綜皆作惜今從吳興藝文補改霜淡照夜雲天朦朧影畫勾闌人情縱似長情月算一年年又能得幾畨圓欲寄西江題葉字流不到五亭前東池始有荷新緑尚小如錢問何日藕幾時蓮漁家傲和程公闢贈別巴子城頭青草暮巴山重疊相逢處燕子占巢花脫樹杯且舉瞿塘水濶舟難渡天外吳門清霅路君家正在吳門住贈我柳枝情幾許春滿縷為君將入江南去原注來詞云折柳贈君君且住碧牡丹步障搖紅綺曉月墮沈烟砌緩板香檀唱徹伊家新製怨入眉頭斂黛峯橫翠芭蕉寒雨聲碎鏡華翳閒照孤鸞戲思量去時容易鈿合瑶叉至今冷落輕棄望極藍橋但暮雲千里幾重山幾重水案王暐道山清話云晏元獻為京兆辟張先為通判新納侍兒公甚屬意先能為詩詞公雅重之每張來令侍兒出侑觴往往歌子野所為之詞其後王夫人寢不容公即出之一日子野至公與之飲子野作此詞令營妓歌之至末句公聞之憮然曰人生行樂耳何自苦如此亟命于宅庫支錢若干復取前所出侍兒既來夫人亦不復誰何也青門引案草堂詩餘題曰春思一作懷舊乍暖還輕冷風雨晚來方定庭軒寂寞近清明殘花中酒又是去年病樓頭畫角風吹醒入夜重門靜那堪更被明月隔牆送過秋千影生查子彈筝案草堂詩餘作咏筝查他山詞評曰玩後四句乃是憶彈筝之人而作非咏筝也含羞整翠鬟得意頻相顧雁柱十三絃一一春鶯語嬌雲容易飛夢斷知何處深院鎖黃昏陳陳芭蕉雨以上見朱竹垞詞綜一落索又名玉聮環來時露浥衣香潤綵縧垂鬢卷簾還喜月相親把酒與花相近西去陽關休問未歌先恨玉峯山下水長流流水盡情無盡偷聲木蘭花雲籠瓊苑梅花瘦外院重扉聫寶獸海月新生上得髙樓沒奈情簾波不動銀釭小今夜夜長爭得曉欲夢髙唐祇恐覺來添斷腸醉紅糚一名雙雁兒瓊林玉樹不相饒薄雲衣細柳腰一般糚樣百般嬌眉兒草堂詩餘作眼秀總如描東風搖草雜花飄恨無計上青條更起雙歌郎且飲郎未醉有金貂感皇恩廊廟當時共代工睢陵千里約逺相從欲知賓主與誰同宗枝內黃閣舊有三公廣樂起雲中湖山看畫軸兩仙翁武陵佳話幾時窮元豐際德星聚照江東百媚娘珠閣五雲仙子未省有誰能似百媚等應天乞與淨飾豓糚俱美取次芳華皆可意何處無桃李蜀被錦文鋪水不放綵鸞雙戲樂事也知存後㑹爭奈眼前心裏緑皺小池紅疊砌花外東風起燕春臺案草堂詩餘題曰元夜麗日千門紫烟雙闕瓊林又報春回殿角一作閣風微當時去燕還來五侯池館屏開探芳菲走馬重簾人語轔轔車幰逺近輕雷雕觴霞􅗷翠幕雲飛楚腰舞柳宫面糚梅金猊夜暖羅衣暗裛香煤洞府人歸笙歌院落燈火樓臺下蓬萊猶有花上月清影徘徊案詞苑英華笙歌句下無院落二字萬紅友以為後人誤增也歸朝歡聲轉轆轤聞露井曉引一作汲銀瓶牽素綆西園人語夜來風叢英飄墮紅成徑寶猊烟未冷蓮臺香蠟殘痕凝等身金誰能得意買此好風草堂詩餘作光景粉落輕糚紅吳興藝文補作溫玉瑩月枕橫叉雲墜領有情無物不雙棲文禽只合常交頸晝長案長字草堂詩餘作夜詞律從之注曰可平然下有春宵永句則非夜可知今據吳興藝文補改正歡豈定爭如翻作春宵永日曈曨嬌柔懶起簾壓吳興藝文補作押陳後山詩話作幕捲花影以上見萬紅友詞律浣溪沙樓倚江邊百尺髙暮烟收一作深處見歸橈一作烟中還未見歸橈幾時期信似春潮花片片飛風㺯蝶一作葉柳隂隂下水平橋日長人去一作才過又今宵又錦帳重重捲暮霞屏風曲曲一作疊疊鬭紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜滿庭芳草襯殘花又水滿池塘花滿枝亂香深裏語黃鸝東風輕軟㺯簾幃日正長時春夢短燕交飛處柳烟低玉窗紅子鬬棋時菩薩蠻咏筝哀筝一弄湘江曲聲聲寫盡湘波緑纎指十三絃細將幽恨傳當筵秋水慢玉柱斜飛雁彈到斷腸時春山眉黛低天仙子案草堂詩餘題曰送春吳興藝文補題曰時為嘉禾小倅以病眠不赴府㑹水調數聲持酒聽午醉一作睡醒來愁未醒送春春去幾時回臨晚鏡傷流景往事悠悠草堂舊刻本作後期空記省沙上竝一作水禽池上暝雲破月來花㺯影重重翠吳興藝文補作簾幕密遮燈風不定人初靜明日落紅應滿徑滿庭芳漁舟紅蓼花繁黃蘆葉亂夜深玉露初零霽天空濶雲淡楚江清獨掉孤篷小艇悠悠過烟渚沙汀金鈎細絲綸漫捲牽動一潭星時時橫短笛清風皓月相與忘形任人笑生涯泛梗飄萍飲罷不妨醉卧塵勞事有耳誰聽江風靜日髙未起枕上酒微醒西江月贈别憶昔錢塘話別十年社燕秋鴻今朝忽遇暮雲東對坐旗亭說夢破帽手遮紅日練衣袖捲寒風蘆花江上雨蓑翁消得幾畨相送浪淘沙楊花腸斷送韶華為惜楊花雪毬搖曵逐風斜容易著人容易去飛過誰家聚散苦咨嗟無計留他行人灑淚滴流霞今日畫堂歌舞地明日天涯以上見草堂詩餘清平樂美人清歌逐酒醉臉鮮霞透櫻小杏青寒食後衣換縷金輕繡畫堂新月朱扉嚴城夜鼓歸遲細看玉人糚面春工不在花枝一叢花傷髙一作春懷逺幾時窮無物似情濃離愁一作心正恁牽一作引千絲亂更南陌飛絮濛濛一作蒙茸嘶騎一作歸漸遙征塵不斷何處認郎蹤雙鴛池沼水溶溶南北小橈一作橋通梯橫畫閣黃昏後又還是斜一作新月簾櫳一作濛濛況恨一作思細思一作思量不如桃杏一作李還一作猶解嫁春一作東風天仙子别渝州醉笑相逢能幾度為報江頭春且住主人今日是行人紅袖舞清歌女憑仗東風閒領取一作交㸃取三月柳枝柔似縷落絮倦飛還戀樹有情寧不憶西園鶯解語花無數應訝使君何處去又公擇將行坐話吳州成樂土詔卷風飛來聖語親輿乞得便藩歸瑶席主杯休數清夜為君歌白苧花按舊枝新蘂吐造化不知人有助看花嵗嵗比甘棠嘉月暮東門路只恐帶將春色去定風波令次子瞻韻送元素內翰浴殿詞臣亦議兵禁中頗牧党羌平詔卷促歸難自緩溪館綵花千數酒泉清春草未青秋葉暮歸去一家行色萬家情可恨黃鶯相識晚望斷湖邊亭上不聞聲又再次韻送子瞻談辨囗囗一作才踈堂上兵畫船齊岸暗潮平萬乘靴袍曾好問須信文章傳口齒牙清三百寺應遊未遍重算湖山風月豈無情不獨渠丘歌叔度行路吳謡終日有餘聲又霅溪席上同㑹者六人楊元素侍讀劉考叔吏部子瞻公擇二學士陳令舉賢良西閣名臣奉詔行南牀吏部錦衣榮中有瀛仙賓與主相遇平津選首更神清溪上玉樓同宴喜歡醉繞隄紅葉惜秋英盡道賢人聚吳分試問也應中一作旁有老人星玉聫環南園巳恨歸來晚芳菲滿眼春工偏上好花多疑不向空枝暖祇一作惜恐紅雲易散叢叢看遍當時猶有蘂如梅問幾日上東風線木蘭花和孫素公别安陸相離徒有相逢夢門外馬蹄塵巳動怨歌留待醉時聽逺目不堪空際送今宵風月知誰共聲咽琵琶槽上鳳人間無物共情多江水不深山不重傾杯樂吳興橫塘靜水花窺影孤城轉浮玉無塵五亭爭景畫橋對起垂虹不斷愛溪上瓊樓憑雕闌久久飛雲逺人在虛空月生溟海寒漁夜泛遊鱗可辨正是草長萍老江南地暖汀洲日晚更茶山巳過清明風雨暴千巖啼鳥怨芳菲故苑深紅盡緑葉陰濃青子枝頭滿使君莫放尋春緩離亭宴公擇別吳興捧黃封詔卷隨處是離亭别宴紅翠成輪歌未遍已恨野橋風便此去濟南非久唯有鳯池鸞殿三月花飛幾片又減却芳菲過半千里恩深雲海淺民愛此春流不斷更上玉樓西歸雁與征帆共逺偷聲木蘭花曾居別乘康吳俗民到于今歌不足驪馭征鞭一去東風十二年重來却擁諸侯騎寶帶垂魚金照地和氣融人清霅千家日日春少年游慢春城三二月禁柳飄綿未歇仙籞生香輕雲凝紫臨層闕歌掌明珠滑酒臉紅霞發華省名髙少年得意時節晝刻三題徹梯漢同登蟾窟玉殿初宣銀袍齊脫生仙骨花探都門曉馬躍芳衢濶宴罷東風鞭捎一行飛雪慶金枝山圍畫障風溪弄月清溶漾玉樓苕館人相望下若醲醅競取金叉當使君歡醉青娥唱分明仙曲雲中響南園百卉千家賞和氣熏人不獨花枝上長相思萍滿溪柳繞隄相送行人溪水西歸時隴月低烟霏霏雨淒淒重倚朱門聽馬嘶寒鴉相對啼行香子案黃花菴詞選題曰美人舞雪歌雲閒淡糚勻藍溪水深染輕裙酒香熏臉粉色生春更巧談話美情性好精神江空花菴詞選作空江無畔凌波何處月橋邊青柳朱門斷鐘殘角又送黃昏奈心中事眼中淚意中人虞美人苕花落盡汀風定苕水天搖影畫船羅綺滿溪春一曲石城清響入髙雲壺觴昔嵗同歌笑今日無年少南園花少故人稀月照玉樓依舊似當時胡搗練霅上送唐彥猷案彥猷名詢使君少醉離亭酒酒醒離愁轉有紫禁時虛右清霅留難久一聲歌掩雙羅袖日落汀花春後猶有東城烟柳青䕃長依舊泛清苕又名感皇恩正月十四日與公擇吳興泛舟緑淨無痕過曉霽清苕鏡裏遊人紅糚巧綵船穩當筵主袐館詞臣吳娃歡飲韓倡競豓容左右生春學為行雨傍畫槳從教水濺羅裙溪烟混月黃昏漸樓臺上下火影星分飛檻倚斗牛近響簫鼓逺破重雲歸軒未至千家待掩半糚翠箔朱門衣香拂面扶醉缷簮花滿袖餘煴醉桃源渭州作雙歌連袂近香猊歌隨鏤板齊分明珠索潄烟溪凝雲定不飛唇破㸃齒編犀春鶯莫亂啼陽關更在碧峰西相看翠黛低以上見董遐周吳興藝文補滿江紅初春飄盡寒梅笑粉蝶遊蜂未覺迤邐水明山秀暖生簾幕過雨小桃紅未透舞烟新柳青猶弱記畫橋深處水邊亭曾偷約多少恨今猶昨愁和悶都忘却拚從前爛醉被花迷著晴鴿試鈴風力軟雛鶯弄舌春寒薄但只愁錦繡鬧糚時東風惡見黃叔暘花菴詞選西江月泛泛春船載樂溶溶湖水平橋髙鬟照影翠烟搖白紵一聲雲杪倦醉天然玉軟卸糚人惜花嬌風情遺恨幾時銷不見盧郎年少見楊升菴詞林萬選玉樹後庭花華燈火樹紅相鬬往來如晝橋河水白天青訝别生星斗落梅穠李還依舊寶叉沽酒曉蟾殘漏心情恨雕鞍歸後見張綖詩餘圖譜卜算子夢短寒夜長坐待清霜曉臨鏡無人為整糚但自學孤鸞照樓臺紅樹杪風月依前好江水東流郎在西問尺素何由到燕歸梁去嵗中秋玩桂輪河漢淨無雲今年江上共瑤尊都不是去年人水晶宫殿琉璃臺閣紅翠兩行分㸃唇微破秀眉顰清影外見歌塵怨王孫花暮春去都門東路嘶馬將行江南江北十里五里郵亭幾程程髙城漸逺重凝睇烟容細晚碧空無際不知今夜何處冷落衾幃欲眠時以上見詞綜補詩醉眠亭案徐碩至元嘉禾志李行中字無悔築亭青龍江上名之曰醉眠東坡少游諸公皆有詩松陵江畔客築室從何年世俗徒紛紛不知李子賢在彼既不知不如醉且眠聲名衮衮誰知命醉非愛酒眠非病長江渾渾無古今羣山回合來相應至元嘉禾志作映呼奴沽酒不可遲買魚斫膾煩老妻何必紉繩繫飛兔百年長短空自知直將褌蝨視天地冥冥支枕窮四時九衢足塵土朱門多是非秋風老蓴鱸扁舟何日歸又案董遐周吳興藝文補作張先詩至元嘉禾志作王觀詩醉翁家有醉眠亭為愛江隄囗案吳興藝文補此字缺至元嘉禾志此字作亂草青不聽耳邊啼鳥亂任教風外雜花零飲酣未必過此舍樂甚應疑造大庭五柳北窗知此趣三閭南楚謾孤醒巢烏案宋文鑑烏作鳥誤烏啼東南林危巢雛五六心在安巢枝一日千往復脫網得羣食入口不入腹窮生俾反哺豈能報成育吳江案吳興藝文補題曰逰松江春後銀魚霜下鱸逺人曾到合思吳欲圗江色不上筆靜覓鳥聲深在蘆落日未昏聞市散青天都盡見山孤橋南水漲虹垂影清夜燈光合太湖題西溪無相院案東坡題跋作華州西溪宋文鑑作題華下無相院西溪胡仔漁隱叢話作湖州西溪積水涵虛上下清幾家門靜岸痕平浮萍破魚隱叢話作斷處見山影小漁隱叢話作野艇歸時聞草聲入郭僧尋塵裏去過橋人似鑑中行巳憑暫雨添秋色莫放修蘆礙月生宋文鑑作礙目生誤贈妓兜娘案趙德麟侯鯖録云子野于吳興守滕子京席上見小妓兜娘子京賞其佳色後十年再見于京口絶非向時容態感之作詩十載芳洲撫白蘋移舟弄水賞青春當時自倚青春力不信東風解誤人營妓張溫卿黃子思愛姬宜哥皆葬宿州城東過而題詩載能改齊漫録好物難留古亦嗟人生無物不塵沙何時種樹連雙冢結就人間竝蒂花和元居中風水洞上祖龍圗韻載咸淳臨安志水色風光近使君浥塵輕雨逐車輪暫來不宿宜無恨多少行春不到人附録張鐸湖州府志曰張先字子野烏程人康定進士案此以子野為康定進士本之勞鉞舊志近查初白蘇詩補注鄭芷畦湖録竝以子野為天聖八年進士本之周公謹齊東野語知吳江縣詩格清麗尤長府樂有雲破月來花㺯影浮萍破處見山影隔牆送過秋千影之句時號張三影李公擇守吳興招集于郡圃為六客之㑹晚嵗優游鄉里嘗放舟釣魚為樂仕至都官郎中有文集一百卷惟樂府行于世李堂湖州府志曰張先字子野烏程人天聖八年進士李公擇守吳興招先及蘇軾陳舜俞楊繪劉述雅集郡圃為六客之㑹晚嵗優游鄉里夀八十九卒孫有字謙仲隱于黃冠以小篆名世宋史藝文志曰張先詩二十卷陳振孫直齊書録解題曰張子野詞一卷都官郎中吳興張先子野撰李公擇嘗為六客堂子野與焉所賦詞卒章云也應傍有老人星蓋以自謂是時年八十餘矣東坡倅杭數與唱酬聞其買妾為之賦詩首末皆用張姓事吳興志稱其晚年漁釣自適至今號張釣魚灣死葬辨山下在今多寶寺案歐陽集有張子野墓志死于寶元中者乃博州人名姓字偶皆同非吳中之子野也案王明清玉照新志曰本朝有兩張先皆字子野一則樞密副使遜孫與歐陽文忠同在洛陽幕府其後文忠為作墓志銘稱其志守端方臨事敢決者一與東坡先生遊東坡推為前輩詩中所謂詩人老去鶯鶯在公子歸來燕燕忙能為樂府號張三影者又案王阮亭居易録曰宋兩張子野皆名先一與歐陽文忠友為孝章皇后戚里之姻官止知亳州鹿邑縣寶元二年年四十八卒一與蘇文忠友公集中云昔自杭移髙密陳令舉張子野皆從至松江夜半月出置酒垂虹亭上子野年八十五以歌詞聞天下作定風波令李公擇守吳興東坡過之㑹于碧瀾堂子野作六客詞坡詩所謂詩人老去鶯鶯在公子歸來燕燕忙詞家所謂張三影者是也官至都官郎中死葬吳興辨山冇集一百卷今有張釣魚灣見掌故集胡應麟筆叢云兩張先皆字子野俱第進士其能詩夀考悉同一博州人號張三影者是也一吳興人胡作正楊而荒陋如此馬端臨文獻通考曰張子野詞一卷案毛子晉所刻六十家詞及詩詞雜俎竝無子野詞董遐周吳興藝文補所載亦僅三十五闋朱彛尊詞綜曰張先字子野吳興人為都官郎中有安陸集詞一卷案無名氏北宋人小集張先張都官集五首李肯菴湖州府志先有文集一百卷惟樂府行于世紹興續編到四庫闕書目張先集十二卷又曰張先安陸集又曰子野詞一卷周草窗齊東野語曰余家偶藏子野詩一帙名安陸集然則安陸為子野集之總名詞僅集中之一卷耳北宋人小集稱為張都官集者非子野集原名也李端叔云子野詞才不足而情有餘朝無咎云子野與耆卿齊名而時以子野不及耆卿然子野韻髙是耆卿所乏處鄭樵通志藝文略曰湖州碧瀾堂詩一卷張詢六客堂詩序曰昔李公擇為此郡㑹于碧瀾堂子野作六客詞鄭元慶湖録曰碧瀾堂詩一卷紹興續編到四庫闕書目有之不知何人編輯蘇軾東坡居士集定風波詞小引曰余昔與張子野劉孝叔李公擇陳令舉楊元素㑹于吳興時子野作六客詞其卒章盡道賢人聚吳分試問也應旁有老人星又曰吾昔自杭移髙密與楊元素同舟而陳令舉張子野皆從吾過李公擇于湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子野年八十五以歌詞聞于天下作定風波令其略云見說賢人聚吳分試問也應旁有老人星坐客歡甚有醉倒者此樂未嘗忘也今七年爾子野孝叔令舉皆為異物而松江橋亭今嵗七月九日海風駕潮平地丈餘蕩盡無復孑遺矣追思曩時真一夢也元豐四年十月二十日黃州臨臯書又題跋曰張先子野善戲謔有風味見杭妓有彈琴者忽舞掌曰異哉此筝不見許時乃爾黑瘦耶又題張子野詩集後曰子野詩筆老妙漁隱叢話作健歌詞乃其餘技漁隱叢話作波耳華漁隱叢話作湖州西溪詩云浮萍破處見山影野艇歸時聞草聲案葉少藴石林詩話方虛谷瀛奎律髓俱作聞棹聲但上句浮萍破處見山影萍與山分寫而景入畫若作棹聲則與艇字語復且意亦平平正如荆公論常建詩暝色赴春愁若改赴為起誰不能道耶與余和詩云愁似鰥魚知夜永懶同蝴蝶為春忙若此之類皆可以追配古人而世俗但稱其歌詞昔周昉畫人物皆入神品而世俗但知有周昉士女皆所謂未見好德如好色者歟元祐五年四月二十一日又次韻答元素詩小引曰余舊有贈元素詞云天涯同是傷流落案東坡有席上呈元素詞調醉落魄後半云尊前一笑休辭却天涯同是傷流落元素以為今日之先兆且悲當時六客之存亡六客蓋張子野劉孝叔陳令舉李公擇及元素與余也案東坡次韻周開祖詩近憶張陳與老劉公自注曰謂張子野陳令舉劉孝叔又元日次韻張先子野見和七夕寄莘老之作云得句牛女夕轉頭參尾中青春先入睡白髮不遺窮酒社我為末刻本作無敵詩壇子有功縮頭先夏鱉實腹鄙秋蟲莫唱裙垂緑無人臉斷紅舊交懷賀老新進謝終童袍鶻一作鵠雙雙瑞腰犀一一通小蠻知在否試問囁嚅翁又和致仕張郎中春晝云投紱歸來萬事一作里輕消磨未一作不盡祗風情舊因蓴菜求長假新為楊枝作短行不禱自安緣夀骨深一作苦藏難沒是詩名淺斟杯酒紅生頰細咏歌詞穩稱聲蝸殼卜居心自放蠅頭寫字眼能明盛衰閲過君應笑寵辱年來我亦平跪履數從圯下老逸書閒問濟南生東風屈指無多日只恐先春鶗鴂鳴又贈張刁二老詩王梅溪蘇詩集注引趙堯卿說曰張子野湖州烏程人刁景純潤州丹陽人兩邦山水未淒涼二老風流總健强共成一百七十嵗各飲三萬六千觴一作場藏春塢裏鶯花鬧仁夀橋邊日月長惟有詩人被磨折金叉零落不成行案當時雖有兩張先考博州張先卒于寶元已卯年四十八又三十五載為熙寧癸丑東坡作此及子野八十五買妾詩皆在是年其為湖州張先無疑王氏集注引趙次公說曰仁夀橋子野所居查他山補注以為今失考又和張子野見寄三絶句曰前生我巳到杭州到處長如到舊遊更欲洞霄為隱吏一菴閒地且相留狂吟跌宕無風雅醉墨淋漓不整齊應為詩人一回顧山僧未忍掃黃泥柏堂南畔竹如雲此閣何人是主人但遣先生披鶴氅不須更畫樂天真趙德麟侯鯖録曰張子野年八十五尚聞買妾陳述古作杭守東坡作倅述古令東坡作詩云錦里先生自笑狂莫欺九尺鬢眉蒼詩人老去鶯鶯在公子歸來燕燕忙柱下相君猶有齒江南刺史巳無腸平生謬作安昌客略遣彭宣到後堂詩人謂張籍公子謂張祐案何薳春渚紀聞所載瓠子冬瓜之謔則祐當作祜柱下張蒼安昌張禹皆使姓張事案王楙野客叢談曰張子野晚年多愛姬東坡有詩曰詩人老去鶯鶯在公子歸來燕燕忙正均用當家故事也嘗考唐有張君瑞遇崔氏女于蒲崔小名鶯鶯元稹與李紳語其事作鶯鶯歌漢童謡曰燕燕尾涎涎張公子時相見又曰張祐妾名燕燕其事蹟與夫對偶精切如此鶯鶯對燕燕巳見于杜牧之詩曰緑樹鶯鶯語平沙燕燕飛前輩用者皆有所祖又案葉少藴石林詩話曰張先郎中能為詩及樂府至老不衰居錢塘蘇子瞻作倅時先年已八十餘視聽尚精强家猶畜聲妓子瞻嘗贈以詩云詩人老去鶯鶯在公子歸來燕燕忙蓋全用張氏故事戲之先和云愁似鰥魚知夜永懶同蝴蝶為春忙極為子曕所賞俚俗多喜傳詠先樂府遂掩其詩聲識者皆以為恨云李之儀姑溪題跋曰長短句寄小重山是譜不傳久矣張先子野始從梨園樂工花日新度之然卒無其詞異時秦觀少游謂其聲有琴中韻將為豫寫其欲言者竟亦不逮崇寧四年冬豫遇故人賀鑄方回遂傳兩闋宛轉紬繹能到人所不到處從而和者凡五六篇案子野小重山詞當時巳失傳則其長短句之散佚者多矣王安石寄張先郎中詩曰留連山水住多時年比馮唐未覺衰篝火尚能書細字郵筒還肯寄新詩胡牀月下知誰對蠻榼花前想自隨投老主恩聊欲報每瞻髙躅恨歸遲又次韻張子野竹林寺二首曰澗水橫斜石路深水源窮處有叢林青鴛幾世開蘭若黃鶴當年瑞卯金敗壁數峯連粉墨涼烟一穗起檀沈十年親友半零落回首舊遊成古今京峴城南隱映深兩牛鳴地得禪林風泉隔屋撞哀玉竹月緣階貼碎金藻井仰窺塵漠漠青燈對宿夜沈沈扁舟過客十年事一夢此山愁至今梅聖俞送張子野屯田知渝州詩曰舊居苕溪上久客咸陽東歸來得虎符馳馬向巴中歌將聽巴人舞欲教渝童況嘗善秦聲樂彼渝人風忠州白使君竹枝詞頗工行當繼其美貢葛勿忩忩案王稱東都事略梅堯臣傳曰同時有張先子野刁約景純皆有文名而逸其事陳師道後山詩話曰張子野老于杭多為官妓作詞而不及龍靚靚獻詩曰天與羣芳十樣葩獨分顏色不堪誇牡丹芍藥人題遍自分身如鼓子花子野為作減字木蘭花詞陳正敏遁齊閒覽曰張子野郎中以樂章擅名一時宋子京尚書竒其才先往見之遣將命者謂曰尚書欲見雲破月來花㺯影郎中子野屏後呼曰得非紅杏枝頭春意鬧尚書邪遂出置酒盡歡蓋二人所舉皆其警策也案古今詩話云子野嘗作天仙子詞云雲破月來花㺯影士大夫多稱之張初謁見歐公迎謂曰好雲破月來花㺯影恨相見之晚也胡仔漁隱叢話曰髙齊詩話云子野嘗有詩云浮萍斷處見山影又長短句云雲破月來花弄影又云隔墻送過秋千影並膾炙人口世謂張三影後山詩話云尚書郎張先善著詞有云雲破月來花弄影簾幕捲花影墮輕絮無影世稱誦之號張三影介甫謂雲破月來花弄影不如李冠朦朧淡月雲來去也古今詩話云有客謂子野曰人皆謂公張三中即心中事眼中淚意中人也公曰何不目之為張三影客不曉公曰雲破月來花㺯影嬌柔懶起簾壓捲花影柳徑無人墮飛絮無影此余平生所得意也苕溪漁隱曰細味三說當以後山古今二詩話所載三影為勝范公稱過庭録曰張先子野郎中一叢花詞云沈思細恨不如桃杏猶解嫁東風一時盛傳歐陽永叔尤愛之恨未識其人子野家南地以故至都謁永叔閽者以通永叔倒屣迎之曰此乃桃李嫁東風郎中東坡守杭子野尚在常預宴席有南鄉子詞末句云聞道賢人聚吳分試問也應傍有老人星蓋年八十餘矣案居易録曰張子野年八十五尚買妾早年有一叢花詞云不如桃杏猶得嫁東風歐陽公稱為桃李嫁東風郎中見范公稱過庭録知兩張子野皆從歐公遊也王暐道山清話案是書載百川學海闕撰人名諸書所引皆作王暐考卷尾有暐跋乃其祖所作尚有館祕録博書記二種曰張先京師人案曝州張子野後家開封見歐陽公所撰墓志故道山以為京師人有文章尤長于詩詞其詩有浮萍斷處見山影小艇歸時聞草聲之句膾炙人口又有雲破月來花弄影隔牆風弄秋千影之詞人目為張三影先字子野其祖母宋氏孝章皇后親妹也祖遜因是而貴太宗朝為樞密副使子野生貴家刻苦過于寒儒取髙科甫改秩為鹿邑縣以殂歐陽永叔雅敬重之嘗言與其同飲酒酣衆客或歌或呼起舞子野獨退然其間不動聲氣當時皆稱為長者今人乃以張三影呼之哀哉歐公為其墓銘案居易録云宋人兩張先皆字子野人往往不能辨未有如道山清話之訛舛者道山云張先京師人有文章尤長于詩詞人目為張三影又號三中此官都官郎中居湖州者年八十餘尚無恙以三影為京師人巳誤其下又云其祖母宋氏孝章皇后妹也子野生貴家刻苦過于寒儒取髙科甫改秩為鹿邑縣以殂歐陽永叔雅敬重之今人乃以張三影呼之哀哉歐陽為其墓銘此戚里官鹿邑縣者年四十八卒不號三影觀此則曾參秋胡之誤又何怪乎許顗彥周詩話云燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨此真可泣鬼神矣張子野長短句云眼力不知人逺上溪橋東坡送子由詩云登髙回首坡壠隔惟見烏帽出復沒皆逺紹其意嚴有翼藝苑雌黃曰張子野過和靖隱居有詩一聫云湖山隱後家空在烟雨詞亡草自青注云先生嘗著春草曲有滿地和烟雨之句今亡其全篇余案楊元素本事曲有㸃綘唇一闋乃和靖春草詞云金谷年年亂生春色誰為主餘花落處滿地和煙雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路此詞甚工子野乃不見其全篇何也案詞綜發凡云張子野弔林君逋詩烟雨詞亡草更青蔡君謨寄李良定詩多麗新詞到海邊一篇之工見之吟咏山林微雲秦學士露華倒影柳屯田曉風殘月柳三變滴粉搓酥左與言一句之工形諸口號當日風尚所存甄藻自爾不爽郎瑛七修類稿曰張先字子野吳興人也髙齊詩話以其詩有浮萍斷處見山影雲破月來花弄影隔牆送過鞦韆影以句工而人目為張三影也后山詩話又改後二影謂簾幕捲花影墮輕絮無影人皆不知何以不同不知初客謂子野曰人皆謂公張三中蓋能道心中事眼中景意中人也公曰我張三影也遂舉後山者言之但原辭尚多數字因詞也後髙齊因子野有前詩三影者亦佳遂著之二收較之似不如公自舉者案諸書所引三影句多不同凌稚哲萬姓統譜又作無數楊花過無影又見石林詩話云子野能文章樂府至老不衰居錢塘年八十餘猶蓄聲妓東坡有聞其買妾時八十五詩以戲之錦里先生自笑狂云云全篇用張姓故事乃戲言耳若歐陽志墓之子野乃博州人偶然同時同名同字也故志之所言逈不與三影為人同也前乃天聖八年進士後乃天聖三年進士梅堯臣宛陵集送張子野知虢州先歸湖州詩曰來赴虢太守暫歸吳興家刻本誤作美興吳興近洞庭橘林正吹花君當橘柚時摘包帶霜華清甘不楚齒若酒傾殘霞溪山小女兒姹姹兩髮了裊裊上氍毹嘈嘈㺯琵琶是時與之醉何以走塵沙又代人寄致仕張郎中詩曰門榮世美髙天下身退心閒住洛陽畫鶴能同薛少保愛書還比蔡中郎花隂小酌呼鄰父月下清吟掃石牀不問從來生計薄題籖盈閣是家藏案宛陵集又有送張子野赴官鄭州詩送張子野袐丞知鹿色詩皆為博州張子野作東坡居士集祭張子野文曰子野郎中張丈之靈曰仕而忘歸人所共蔽有志不果日月其逝惟余子野歸及强鋭優游故鄉若復一世遇人坦率真古愷悌龎然老成又敏且藝清詩絶俗甚典而麗搜研物情刮發幽翳微詞宛轉蓋詩之裔坐此而窮鹽米不繼嘯歌自得有酒輒詣我官於杭始獲擁篲歡欣忘年脫略苛細送我北歸屈指默記死生一訣流涕挽袂我來故國實五周嵗不我少須一病遽蛻堂有遺像室無留嬖人亡琴廢帳空鶴唳酹觴再拜淚溢兩眥葉適水心文集題張都官送行詩後曰張公送行詩及題卷後者司馬范公而下瑰瑋名士往往在焉言語字畫森然眼旁歘懷其人不寐竟夕案司馬文正范文正范忠宣三公集並無送張都官詩及卷後題跋無從考其人正則所稱未敢遽定為子野姑附于此宋雷西吳里語曰永興寺戴融祠堂記鄉貢進士張先撰石刻在寺勞鉞湖州府志曰戴公生祠碑宋都官郎中張先撰在鹿苑寺案碑今不存文亦無考且新舊府志名宦傳不載融名又案程量府志云鹿苑寺在歸安縣南射村梁大同元年建後廢唐大歷間僧明誓重建請額賜名永興宋治平二年改今額安陸集
